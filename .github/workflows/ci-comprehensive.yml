name: CI - Comprehensive

on:
  push:
    branches: [main, 'feature/**', 'dev/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-comprehensive-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: CI Preflight
    runs-on: ubuntu-latest
    outputs:
      has_python_api: ${{ steps.detect.outputs.has_python_api }}
      has_webapp: ${{ steps.detect.outputs.has_webapp }}
      has_modules: ${{ steps.detect.outputs.has_modules }}
      has_solution: ${{ steps.detect.outputs.has_solution }}
    steps:
      - uses: actions/checkout@v4

      - id: detect
        name: Detect repository components
        shell: bash
        run: |
          set -euo pipefail

          has_python_api=false
          has_webapp=false
          has_modules=false
          has_solution=false

          [ -f "apps/UnifiedPromptApp/services/prompt-api/requirements.txt" ] && has_python_api=true
          [ -f "apps/unifiedtoolbox.webapp/package.json" ] && has_webapp=true
          [ -d "modules" ] && has_modules=true
          find . -maxdepth 3 -type f \( -name '*.sln' -o -name '*.slnx' \) | grep -q . && has_solution=true || true

          echo "has_python_api=$has_python_api" >> "$GITHUB_OUTPUT"
          echo "has_webapp=$has_webapp" >> "$GITHUB_OUTPUT"
          echo "has_modules=$has_modules" >> "$GITHUB_OUTPUT"
          echo "has_solution=$has_solution" >> "$GITHUB_OUTPUT"

          {
            echo "## CI Preflight"
            echo "- python api: $has_python_api"
            echo "- web app: $has_webapp"
            echo "- powershell modules: $has_modules"
            echo "- dotnet solution: $has_solution"
          } >> "$GITHUB_STEP_SUMMARY"

  powershell:
    name: PowerShell (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: preflight
    if: needs.preflight.outputs.has_modules == 'true'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force -ErrorAction Stop

      - name: Syntax check PowerShell scripts
        shell: pwsh
        run: |
          $errors = @()
          Get-ChildItem -Path modules,scripts -Recurse -Include *.ps1,*.psm1 -File | ForEach-Object {
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$null, [ref]$parseErrors)
            if ($parseErrors) {
              $parseErrors | ForEach-Object {
                $errors += "{0}:{1} {2}" -f $_.Extent.File, $_.Extent.StartLineNumber, $_.Message
              }
            }
          }

          if ($errors.Count -gt 0) {
            $errors | ForEach-Object { Write-Error $_ }
            throw "PowerShell syntax validation failed."
          }

      - name: Lint changed PowerShell folders
        shell: pwsh
        run: |
          $targets = @('modules', 'scripts') | Where-Object { Test-Path $_ }
          if (-not $targets) {
            Write-Host "No PowerShell targets detected; skipping lint." -ForegroundColor Yellow
            exit 0
          }
          Invoke-ScriptAnalyzer -Path $targets -Recurse -Severity Error

      - name: Build prompt index (best effort)
        shell: pwsh
        run: |
          if (Test-Path "scripts/Build-Index.ps1") {
            pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/Build-Index.ps1
          } else {
            Write-Host "scripts/Build-Index.ps1 not found; skipping." -ForegroundColor Yellow
          }

      - name: Upload prompt index artifact
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: prompt-index-${{ matrix.os }}
          path: data/prompts.db
          if-no-files-found: warn
          retention-days: 7

  python-api:
    name: Python API (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.has_python_api == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    defaults:
      run:
        working-directory: apps/UnifiedPromptApp/services/prompt-api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: apps/UnifiedPromptApp/services/prompt-api/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest

      - name: Run API tests (collection-safe subset)
        env:
          PYTHONPATH: .
        run: |
          pytest -q \
            --maxfail=1 \
            tests/test_prompts.py \
            tests/test_prompt_gates.py \
            tests/test_quality_metrics.py \
            tests/test_safe_json_loading.py \
            tests/test_sanitize_run_id.py -k "not unicode_characters_preserved"

  unified-webapp:
    name: Unified Web App (Next.js)
    runs-on: ubuntu-latest
    needs: preflight
    if: needs.preflight.outputs.has_webapp == 'true'
    defaults:
      run:
        working-directory: apps/unifiedtoolbox.webapp

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/unifiedtoolbox.webapp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run targeted vitest suite
        run: npx vitest run src/lib/app-factory/__tests__/serverOpenAI.test.ts

      - name: Collect deterministic webapp CI artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/artifacts/ci/webapp"
          cp package.json "$GITHUB_WORKSPACE/artifacts/ci/webapp/package.json"
          cp package-lock.json "$GITHUB_WORKSPACE/artifacts/ci/webapp/package-lock.json"

      - name: Upload webapp CI artifact
        uses: actions/upload-artifact@v4
        with:
          name: unified-webapp-ci
          path: artifacts/ci/webapp
          if-no-files-found: error
          retention-days: 14

  desktop-app:
    name: Desktop App (.NET)
    runs-on: windows-latest
    needs: preflight
    if: needs.preflight.outputs.has_solution == 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore and build detected solutions
        shell: pwsh
        run: |
          $solutions = Get-ChildItem -Path . -Recurse -Include *.sln,*.slnx -File | Select-Object -ExpandProperty FullName
          if (-not $solutions) {
            Write-Host "No .NET solution found; skipping." -ForegroundColor Yellow
            exit 0
          }

          foreach ($sln in $solutions) {
            dotnet restore $sln
            dotnet build $sln --configuration Release --no-restore
          }

  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [preflight, powershell, python-api, unified-webapp]
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Run repository smoke checks
        shell: bash
        run: |
          set -euo pipefail
          [ -f README.md ]
          [ -f .github/workflows/ci-comprehensive.yml ]
          [ -d apps ]
          echo "Smoke checks passed"

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [preflight, powershell, python-api, unified-webapp, desktop-app, smoke-tests]
    if: always()
    steps:
      - name: Report matrix and gate outcomes
        shell: bash
        run: |
          set -euo pipefail

          powershell_result="${{ needs.powershell.result }}"
          python_result="${{ needs.python-api.result }}"
          webapp_result="${{ needs.unified-webapp.result }}"
          desktop_result="${{ needs.desktop-app.result }}"
          smoke_result="${{ needs.smoke-tests.result }}"

          {
            echo "## CI Results Summary"
            echo "| Job | Result |"
            echo "|---|---|"
            echo "| PowerShell | ${powershell_result} |"
            echo "| Python API | ${python_result} |"
            echo "| Unified Web App | ${webapp_result} |"
            echo "| Desktop App | ${desktop_result} |"
            echo "| Smoke Tests | ${smoke_result} |"
          } >> "$GITHUB_STEP_SUMMARY"

          # Required jobs: python/webapp/smoke when they actually ran.
          if [[ "$python_result" == "failure" || "$webapp_result" == "failure" || "$smoke_result" == "failure" ]]; then
            echo "❌ One or more required checks failed." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "✅ Required checks passed." >> "$GITHUB_STEP_SUMMARY"
