name: CI - Comprehensive

# Triggers: pushes to main/feature branches and pull requests
on:
  push:
    branches:
      - main
      - 'feature/**'
      - 'dev/**'
  pull_request:
    branches:
      - main

# Allow manual workflow runs
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  # ============================================================================
  # PowerShell Module Tests & Linting
  # ============================================================================
  powershell:
    name: PowerShell (${{ matrix.pwsh }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        pwsh: ["7.4"]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -Scope CurrentUser -Force -MinimumVersion 5.5.0
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
          Install-Module powershell-yaml -Scope CurrentUser -Force
      
      - name: Lint PowerShell scripts
        shell: pwsh
        run: |
          Write-Host "Linting PowerShell modules..." -ForegroundColor Cyan
          Invoke-ScriptAnalyzer -Path modules -Recurse -Severity Error,Warning -EnableExit
      
      - name: Run PowerShell tests
        shell: pwsh
        run: |
          Write-Host "Running PowerShell tests..." -ForegroundColor Cyan
          # Add modules directory to PSModulePath for tests
          $env:PSModulePath = "$PWD/modules" + [IO.Path]::PathSeparator + $env:PSModulePath
          
          # Run tests with detailed output
          $testResults = Invoke-Pester -Path tests -CI -Output Detailed -PassThru
          
          if ($testResults.FailedCount -gt 0) {
            Write-Error "$($testResults.FailedCount) test(s) failed"
            exit 1
          }
      
      - name: Build prompt index
        shell: pwsh
        run: |
          Write-Host "Building prompt index..." -ForegroundColor Cyan
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/Build-Index.ps1
      
      - name: Verify prompt database
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          echo "=== Database Info ==="
          ls -lh data/prompts.db
          echo ""
          echo "=== Table Counts ==="
          sqlite3 data/prompts.db "SELECT (SELECT COUNT(*) FROM prompts) as prompts, (SELECT COUNT(*) FROM agents) as agents;" || echo "Warning: Could not query database"
      
      - name: Upload prompt database artifact
        uses: actions/upload-artifact@v4
        with:
          name: prompt-index-${{ matrix.os }}-${{ matrix.pwsh }}
          path: data/prompts.db
          retention-days: 7
          if-no-files-found: warn

  # ============================================================================
  # Python API Tests & Linting
  # ============================================================================
  python-api:
    name: Python API (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    
    defaults:
      run:
        working-directory: Orchestration/UnifiedPromptApp/services/prompt-api
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: Orchestration/UnifiedPromptApp/services/prompt-api/requirements.txt
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .[dev]
          pip install flake8 pytest pytest-cov
      
      - name: Lint with flake8
        run: |
          # Stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      - name: Run pytest with coverage
        run: |
          pytest -v --cov=. --cov-report=term --cov-report=xml
      
      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: matrix.python-version == '3.12'
        with:
          name: python-coverage-report
          path: Orchestration/UnifiedPromptApp/services/prompt-api/coverage.xml
          retention-days: 7
          if-no-files-found: warn

  # ============================================================================
  # Dashboard (React/Vite) Build & Tests
  # ============================================================================
  dashboard:
    name: Dashboard (React/Vite)
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: apps/dashboard
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/dashboard/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint TypeScript/JavaScript
        run: npm run lint
      
      - name: Run tests
        run: npm test
      
      - name: Build dashboard
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: apps/dashboard/dist
          retention-days: 30
          if-no-files-found: error

  # ============================================================================
  # Unified Web App (Next.js) Build & Tests
  # ============================================================================
  unified-webapp:
    name: Unified Web App (Next.js)
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: apps/unifiedtoolbox.webapp
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/unifiedtoolbox.webapp/package-lock.json
      
      - name: Install dependencies
        run: npm ci
      
      - name: Lint Next.js app
        run: npm run lint
      
      - name: Build web app
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8000
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unified-webapp-build
          path: apps/unifiedtoolbox.webapp/.next
          retention-days: 30
          if-no-files-found: error

  # ============================================================================
  # Desktop App (.NET) Build - Windows Only
  # ============================================================================
  desktop-app:
    name: Desktop App (.NET)
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      
      - name: Restore dependencies
        run: dotnet restore UnifiedAIToolbox.sln
      
      - name: Build solution
        run: dotnet build UnifiedAIToolbox.sln --configuration Release --no-restore
      
      - name: Collect build artifacts
        shell: pwsh
        run: |
          # Create artifacts directory
          New-Item -ItemType Directory -Force -Path artifacts/desktop-builds
          
          # Copy OrchestrationDesktop outputs
          if (Test-Path "apps/OrchestrationDesktop/bin/Release") {
            Copy-Item -Path "apps/OrchestrationDesktop/bin/Release" -Destination "artifacts/desktop-builds/OrchestrationDesktop" -Recurse -Force
          }
          
          # Copy OrchestrationDesktopLauncher outputs
          if (Test-Path "apps/OrchestrationDesktopLauncher/bin/Release") {
            Copy-Item -Path "apps/OrchestrationDesktopLauncher/bin/Release" -Destination "artifacts/desktop-builds/OrchestrationDesktopLauncher" -Recurse -Force
          }
      
      - name: Upload desktop app artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-app-builds
          path: artifacts/desktop-builds
          retention-days: 30
          if-no-files-found: warn

  # ============================================================================
  # Integration Smoke Tests
  # ============================================================================
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [powershell, python-api]
    if: success()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install Python dependencies
        working-directory: Orchestration/UnifiedPromptApp/services/prompt-api
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .[dev]
      
      - name: Run smoke tests
        run: |
          echo "Running smoke test checks..."
          # Basic import test
          python -c "import sys; sys.path.insert(0, 'Orchestration/UnifiedPromptApp/services/prompt-api'); from app import app; print('✓ API imports successfully')"
      
      - name: Run PowerShell smoke tests
        shell: pwsh
        run: |
          Write-Host "Running PowerShell smoke tests..." -ForegroundColor Cyan
          pwsh -NoProfile -ExecutionPolicy Bypass -File Smoketest.ps1

  # ============================================================================
  # CI Summary
  # ============================================================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [powershell, python-api, dashboard, unified-webapp, desktop-app, smoke-tests]
    if: always()
    
    steps:
      - name: Check job results
        run: |
          powershell_result="${{ needs.powershell.result }}"
          python_result="${{ needs.python-api.result }}"
          dashboard_result="${{ needs.dashboard.result }}"
          webapp_result="${{ needs.unified-webapp.result }}"
          desktop_result="${{ needs.desktop-app.result }}"
          smoke_result="${{ needs.smoke-tests.result }}"

          checkbox() {
            if [ "$1" = "success" ]; then
              echo "x"
            else
              echo " "
            fi
          }

          echo "## CI Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| PowerShell | $powershell_result |" >> $GITHUB_STEP_SUMMARY
          echo "| Python API | $python_result |" >> $GITHUB_STEP_SUMMARY
          echo "| Dashboard | $dashboard_result |" >> $GITHUB_STEP_SUMMARY
          echo "| Unified Web App | $webapp_result |" >> $GITHUB_STEP_SUMMARY
          echo "| Desktop App | $desktop_result |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | $smoke_result |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Coverage checklist" >> $GITHUB_STEP_SUMMARY
          echo "- [$(checkbox "$powershell_result")] PowerShell modules lint & tests" >> $GITHUB_STEP_SUMMARY
          echo "- [$(checkbox "$python_result")] Prompt API lint & pytest with coverage" >> $GITHUB_STEP_SUMMARY
          echo "- [$(checkbox "$dashboard_result")] Dashboard lint, unit tests, and build" >> $GITHUB_STEP_SUMMARY
          echo "- [$(checkbox "$webapp_result")] Unified web app lint & build" >> $GITHUB_STEP_SUMMARY
          echo "- [$(checkbox "$desktop_result")] Desktop app build" >> $GITHUB_STEP_SUMMARY
          echo "- [$(checkbox "$smoke_result")] Smoke checks (API import & PowerShell smoke)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Follow-up coverage tasks" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Add automated tests for the unified web app (currently lint/build only)" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Add automated tests for desktop applications (currently build-only)" >> $GITHUB_STEP_SUMMARY
          echo "- [ ] Expand integration smoke tests beyond import and basic PowerShell checks" >> $GITHUB_STEP_SUMMARY
          
          # Fail if any required job failed
          if [[ "$powershell_result" == "failure" ]] || \
             [[ "$python_result" == "failure" ]] || \
             [[ "$dashboard_result" == "failure" ]] || \
             [[ "$webapp_result" == "failure" ]]; then
            echo "❌ One or more critical jobs failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
          
          echo "✅ All critical jobs passed" >> $GITHUB_STEP_SUMMARY
