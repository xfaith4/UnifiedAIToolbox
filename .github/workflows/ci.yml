name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  prompt_api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Orchestration/UnifiedPromptApp/services/prompt-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.1'
          cache: 'pip'
          cache-dependency-path: Orchestration/UnifiedPromptApp/services/prompt-api/requirements.txt

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .[dev]

      - name: Test
        run: pytest

  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [prompt_api]
    steps:
      - name: Summarize coverage
        run: |
          api_result="${{ needs.prompt_api.result }}"

          checkbox() {
            if [ "$1" = "success" ]; then
              echo "x"
            else
              echo " "
            fi
          }

          echo "## CI Coverage Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- [$(checkbox "$api_result")] Prompt API tests (Orchestration/UnifiedPromptApp/services/prompt-api)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Follow-up coverage tasks" >> "$GITHUB_STEP_SUMMARY"
          echo "- [ ] Next.js unified web app not exercised in this workflow" >> "$GITHUB_STEP_SUMMARY"
          echo "- [ ] .NET desktop applications not exercised in this workflow" >> "$GITHUB_STEP_SUMMARY"

          if [ "$api_result" = "failure" ]; then
            exit 1
          fi
