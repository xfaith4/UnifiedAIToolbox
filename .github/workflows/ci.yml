name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  prompt_api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Orchestration/UnifiedPromptApp/services/prompt-api
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.1'
          cache: 'pip'
          cache-dependency-path: Orchestration/UnifiedPromptApp/services/prompt-api/requirements.txt

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .[dev]

      - name: Test
        run: pytest
