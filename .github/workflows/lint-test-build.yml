name: CI - Lint, Test & Build

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  powershell:
    name: PowerShell (${{ matrix.pwsh }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        pwsh: ["7.4"]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -Scope CurrentUser -Force -MinimumVersion 5.5.0
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force
          Install-Module powershell-yaml -Scope CurrentUser -Force
      
      - name: Lint PowerShell
        shell: pwsh
        run: |
          Invoke-ScriptAnalyzer -Path modules -Recurse -Severity Warning -EnableExit
      
      - name: Run PowerShell tests
        shell: pwsh
        run: |
          # Add modules directory to PSModulePath for tests
          $env:PSModulePath = "$PWD/modules" + [IO.Path]::PathSeparator + $env:PSModulePath
          Invoke-Pester -Path tests -CI -Output Detailed
      
      - name: Build prompt index
        shell: pwsh
        run: |
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/Build-Index.ps1
      
      - name: Verify prompt index
        shell: bash
        run: |
          echo "=== Database Info ==="
          ls -lh data/prompts.db
          echo ""
          echo "=== Table Counts ==="
          sqlite3 data/prompts.db "SELECT (SELECT COUNT(*) FROM prompts) as prompts, (SELECT COUNT(*) FROM agents) as agents;"
          echo ""
          echo "=== FTS Test Search ==="
          sqlite3 data/prompts.db "SELECT COUNT(*) FROM prompts_fts JOIN prompts p ON prompts_fts.id = p.id WHERE prompts_fts MATCH 'powershell';"
      
      - name: Upload prompt database
        uses: actions/upload-artifact@v4
        with:
          name: prompt-index-${{ matrix.os }}-${{ matrix.pwsh }}
          path: data/prompts.db
          retention-days: 7

  python:
    name: Python (prompt-api)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Show repo layout for debug
        run: |
          echo "PWD: $(pwd)"
          echo "Top-level files:"
          ls -la
          echo ""
          echo "services directory (if present):"
          ls -la services || true
          echo ""
          echo "packages directory (if present):"
          ls -la packages || true
          echo ""
          echo "apps directory (if present):"
          ls -la apps || true
          echo ""
          echo "Orchestration directory (if present):"
          ls -la Orchestration || true

      - name: Detect prompt-api directory
        id: detect
        run: |
          candidates=(
            "services/prompt-api"
            "services/prompt_api"
            "packages/prompt-api"
            "packages/prompt_api"
            "apps/prompt-api"
            "Orchestration/UnifiedPromptApp/services/prompt-api"
          )

          for d in "${candidates[@]}"; do
            if [ -d "$d" ]; then
              echo "Found prompt-api at: $d"
              echo "path=$d" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          done

          echo "No prompt-api directory found in expected locations." >&2
          echo "Expected one of: ${candidates[*]}" >&2
          echo "path=" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        if: steps.detect.outputs.path != ''
        working-directory: ${{ steps.detect.outputs.path }}
        run: |
          python -m pip install --upgrade pip
          pip install "${GITHUB_WORKSPACE}/packages/prompt-registry" || true
          pip install -e .[dev]
          pip install flake8

      - name: Lint with flake8
        if: steps.detect.outputs.path != ''
        working-directory: ${{ steps.detect.outputs.path }}
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Run pytest
        if: steps.detect.outputs.path != ''
        working-directory: ${{ steps.detect.outputs.path }}
        run: |
          pytest -v

  dashboard:
    name: Dashboard (React/Vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/dashboard/package-lock.json
      
      - name: Install dependencies
        working-directory: apps/dashboard
        run: npm ci
      
      - name: Lint TypeScript/JavaScript
        working-directory: apps/dashboard
        run: npm run lint
      
      - name: Run tests
        working-directory: apps/dashboard
        run: npm test
      
      - name: Build dashboard
        working-directory: apps/dashboard
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-build
          path: apps/dashboard/dist
          retention-days: 7

  unified_webapp:
    name: Unified Web App (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/unifiedtoolbox.webapp/package-lock.json
      
      - name: Install dependencies
        working-directory: apps/unifiedtoolbox.webapp
        run: npm ci
      
      - name: Lint
        working-directory: apps/unifiedtoolbox.webapp
        run: npm run lint
      
      - name: Build web app
        working-directory: apps/unifiedtoolbox.webapp
        run: npm run build
      
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: unified-webapp-build
          path: apps/unifiedtoolbox.webapp/.next
          retention-days: 7
