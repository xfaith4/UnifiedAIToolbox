name: Repository Analysis - Scheduled

# Scheduled runs: Daily at 6 AM UTC, Weekly on Monday at 6 AM UTC
# Can also be triggered manually
'on':
  schedule:
    # Daily at 6:00 AM UTC
    - cron: '0 6 * * *'
    # Weekly on Monday at 6:00 AM UTC (commented out to avoid double-run on Mondays)
    # - cron: '0 6 * * 1'
  
  # Allow manual workflow runs with optional parameters
  workflow_dispatch:
    inputs:
      analysis_type:
        description: 'Type of analysis to run'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - quick
          - security-only
      
      include_metrics:
        description: 'Include detailed metrics'
        required: false
        default: 'true'
        type: boolean

permissions:
  contents: read
  issues: write  # For creating issues if critical problems found

jobs:
  # ============================================================================
  # Repository Health Analysis
  # ============================================================================
  repo-health-analysis:
    name: Repository Health Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for comprehensive analysis
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module powershell-yaml -Scope CurrentUser -Force
      
      - name: Run repository analysis
        shell: pwsh
        run: |
          Write-Host "Starting repository analysis..." -ForegroundColor Cyan
          
          # Create artifacts directory
          New-Item -ItemType Directory -Force -Path artifacts/repo-analysis
          
          # Execute the repo analysis script
          $timestamp = Get-Date -Format "yyyy-MM-dd_HH-mm-ss"
          $reportPath = "artifacts/repo-analysis/UnifiedAIToolbox_RepoHealth_$timestamp.json"
          
          # Run the analysis script
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/Run-RepoAnalysis.ps1 `
            -OutputPath $reportPath `
            -AnalysisType "${{ github.event.inputs.analysis_type || 'full' }}" `
            -IncludeMetrics:$${{ github.event.inputs.include_metrics || 'true' }}
          
          Write-Host "Analysis complete. Report saved to: $reportPath" -ForegroundColor Green
      
      - name: Generate HTML report
        shell: pwsh
        run: |
          Write-Host "Generating HTML report..." -ForegroundColor Cyan
          
          # Find the latest JSON report
          $jsonReport = Get-ChildItem -Path artifacts/repo-analysis -Filter "*.json" | 
            Sort-Object LastWriteTime -Descending | 
            Select-Object -First 1
          
          if ($jsonReport) {
            $htmlPath = $jsonReport.FullName -replace '\.json$', '.html'
            
            # Generate HTML report
            pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/Convert-RepoAnalysisToHtml.ps1 `
              -JsonPath $jsonReport.FullName `
              -OutputPath $htmlPath
            
            Write-Host "HTML report generated: $htmlPath" -ForegroundColor Green
          } else {
            Write-Warning "No JSON report found to convert"
          }
      
      - name: Upload analysis reports
        uses: actions/upload-artifact@v4
        with:
          name: repo-analysis-${{ github.run_number }}
          path: artifacts/repo-analysis/
          retention-days: 90  # Keep for 3 months
          if-no-files-found: error
      
      - name: Check for critical issues
        shell: pwsh
        run: |
          Write-Host "Checking for critical issues..." -ForegroundColor Cyan
          
          $jsonReport = Get-ChildItem -Path artifacts/repo-analysis -Filter "*.json" | 
            Sort-Object LastWriteTime -Descending | 
            Select-Object -First 1
          
          if ($jsonReport) {
            $analysis = Get-Content $jsonReport.FullName -Raw | ConvertFrom-Json
            
            # Check for critical issues
            $criticalIssues = @()
            
            if ($analysis.security) {
              if ($analysis.security.critical_vulnerabilities -gt 0) {
                $criticalIssues += "Found $($analysis.security.critical_vulnerabilities) critical security vulnerabilities"
              }
            }
            
            if ($analysis.build) {
              if ($analysis.build.failed_builds -gt 0) {
                $criticalIssues += "Found $($analysis.build.failed_builds) failed builds"
              }
            }
            
            if ($criticalIssues.Count -gt 0) {
              Write-Warning "Critical issues detected:"
              foreach ($issue in $criticalIssues) {
                Write-Warning "  - $issue"
              }
              
              # Set output for potential issue creation
              "has_critical_issues=true" >> $env:GITHUB_OUTPUT
              "critical_issues=$($criticalIssues -join '; ')" >> $env:GITHUB_OUTPUT
            } else {
              Write-Host "✓ No critical issues detected" -ForegroundColor Green
              "has_critical_issues=false" >> $env:GITHUB_OUTPUT
            }
          }
        id: check-issues

  # ============================================================================
  # Prompt Library Analysis
  # ============================================================================
  prompt-library-analysis:
    name: Prompt Library Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Install PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module powershell-yaml -Scope CurrentUser -Force
          Import-Module PromptLibrary -Force
          if (-not (Get-Command Get-Prompt -ErrorAction SilentlyContinue)) {
             Write-Error "Get-Prompt function not found. Ensure the PromptLibrary module is present and imported correctly."
          exit 1
          }
          $prompts = Get-Prompt
      - name: Build prompt index
        shell: pwsh
        run: |
          Write-Host "Building prompt index..." -ForegroundColor Cyan
          pwsh -NoProfile -ExecutionPolicy Bypass -File scripts/Build-Index.ps1
      
      - name: Analyze prompt library
        shell: pwsh
        run: |
          Write-Host "Analyzing prompt library..." -ForegroundColor Cyan
          
          # Create artifacts directory
          New-Item -ItemType Directory -Force -Path artifacts/prompt-analysis
          
          $timestamp = Get-Date -Format "yyyy-MM-dd_HH-mm-ss"
          $reportPath = "artifacts/prompt-analysis/PromptLibrary_Analysis_$timestamp.json"
          
          # Import module and analyze
          $env:PSModulePath = "$PWD/modules" + [IO.Path]::PathSeparator + $env:PSModulePath
          Import-Module PromptLibrary -Force
          
          $prompts = Get-Prompt
          $agents = Get-Agent
          
          # Generate analysis report
          $analysis = @{
            timestamp = (Get-Date -Format "o")
            prompts = @{
              total_count = $prompts.Count
              categories = ($prompts | Group-Object category | Select-Object Name, Count)
              risk_tiers = ($prompts | Group-Object risk_tier | Select-Object Name, Count)
              tags = ($prompts | ForEach-Object { $_.telemetry.tags } | Group-Object | Select-Object Name, Count | Sort-Object Count -Descending | Select-Object -First 10)
            }
            agents = @{
              total_count = $agents.Count
              roles = ($agents | Group-Object role | Select-Object Name, Count)
            }
          }
          
          $analysis | ConvertTo-Json -Depth 10 | Out-File $reportPath -Encoding UTF8
          Write-Host "Prompt library analysis saved to: $reportPath" -ForegroundColor Green
      
      - name: Upload prompt analysis
        uses: actions/upload-artifact@v4
        with:
          name: prompt-library-analysis-${{ github.run_number }}
          path: artifacts/prompt-analysis/
          retention-days: 90
          if-no-files-found: error

  # ============================================================================
  # Code Quality Metrics
  # ============================================================================
  code-quality-metrics:
    name: Code Quality Metrics
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for metrics
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install analysis tools
        run: |
          pip install radon pylint bandit
      
      - name: Analyze Python code quality
        run: |
          mkdir -p artifacts/code-metrics
          
          echo "Analyzing Python code complexity..."
          find . -name "*.py" -not -path "./.venv/*" -not -path "./venv/*" -not -path "./node_modules/*" | \
            xargs radon cc -s -a > artifacts/code-metrics/python-complexity.txt || true
          
          echo "Analyzing Python maintainability..."
          find . -name "*.py" -not -path "./.venv/*" -not -path "./venv/*" -not -path "./node_modules/*" | \
            xargs radon mi -s > artifacts/code-metrics/python-maintainability.txt || true
          
          echo "Running security analysis..."
          bandit -r . -f json -o artifacts/code-metrics/security-scan.json || true
      
      - name: Analyze PowerShell code
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          
          Write-Host "Analyzing PowerShell code quality..." -ForegroundColor Cyan
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -ReportSummary
          
          $summary = @{
            timestamp = (Get-Date -Format "o")
            total_files_scanned = (Get-ChildItem -Path . -Filter "*.ps1" -Recurse | Measure-Object).Count
            issues_by_severity = $results | Group-Object Severity | Select-Object Name, Count
          }
          
          $summary | ConvertTo-Json -Depth 10 | Out-File "artifacts/code-metrics/powershell-quality.json" -Encoding UTF8
      
      - name: Count lines of code
        shell: bash
        run: |
          echo "Counting lines of code by language..."
          
          # Simple LOC counter
          {
            echo "## Lines of Code Summary"
            echo ""
            echo "Language | Files | Lines"
            echo "---------|-------|------"
            echo "PowerShell | $(find . -name '*.ps1' -not -path '*/node_modules/*' -not -path '*/.venv/*' | wc -l) | $(find . -name '*.ps1' -not -path '*/node_modules/*' -not -path '*/.venv/*' -exec cat {} \; | wc -l)"
            echo "Python | $(find . -name '*.py' -not -path '*/node_modules/*' -not -path '*/.venv/*' | wc -l) | $(find . -name '*.py' -not -path '*/node_modules/*' -not -path '*/.venv/*' -exec cat {} \; | wc -l)"
            echo "TypeScript | $(find . -name '*.ts' -o -name '*.tsx' -not -path '*/node_modules/*' | wc -l) | $(find . -name '*.ts' -o -name '*.tsx' -not -path '*/node_modules/*' -exec cat {} \; | wc -l)"
            echo "JavaScript | $(find . -name '*.js' -o -name '*.jsx' -not -path '*/node_modules/*' | wc -l) | $(find . -name '*.js' -o -name '*.jsx' -not -path '*/node_modules/*' -exec cat {} \; | wc -l)"
            echo "C# | $(find . -name '*.cs' | wc -l) | $(find . -name '*.cs' -exec cat {} \; | wc -l)"
          } > artifacts/code-metrics/loc-summary.md
      
      - name: Upload code metrics
        uses: actions/upload-artifact@v4
        with:
          name: code-quality-metrics-${{ github.run_number }}
          path: artifacts/code-metrics/
          retention-days: 90
          if-no-files-found: warn

  # ============================================================================
  # Analysis Summary
  # ============================================================================
  analysis-summary:
    name: Analysis Summary
    runs-on: ubuntu-latest
    needs: [repo-health-analysis, prompt-library-analysis, code-quality-metrics]
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          echo "## 📊 Repository Analysis Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Run Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Run Number:** ${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Repository Health | ${{ needs.repo-health-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Prompt Library | ${{ needs.prompt-library-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Code Quality | ${{ needs.code-quality-metrics.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Repository health analysis reports" >> $GITHUB_STEP_SUMMARY
          echo "- Prompt library analysis" >> $GITHUB_STEP_SUMMARY
          echo "- Code quality metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All artifacts are available in the workflow run artifacts section." >> $GITHUB_STEP_SUMMARY

