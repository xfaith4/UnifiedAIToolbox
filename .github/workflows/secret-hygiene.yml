name: Secret Hygiene

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  secret-hygiene:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Block Tracked .env Files
        shell: bash
        run: |
          set -euo pipefail

          tracked_env="$(git ls-files | grep -E '(^|/)\.env($|[.][^/]+$)' || true)"
          if [[ -z "${tracked_env}" ]]; then
            echo "No tracked .env files found."
            exit 0
          fi

          disallowed="$(echo "${tracked_env}" | grep -vE '(^|/)\.env\.example$|(^|/)\.env\.[^/]+\.example$' || true)"
          if [[ -n "${disallowed}" ]]; then
            echo "Disallowed tracked .env files detected:"
            echo "${disallowed}"
            exit 1
          fi

          echo "Tracked env files are example-only."

      - name: Block Secret-Like NEXT_PUBLIC Values
        shell: bash
        run: |
          set -euo pipefail

          mapfile -t env_files < <(git ls-files | grep -E '(^|/)\.env($|[.][^/]+$)' || true)
          if [[ ${#env_files[@]} -eq 0 ]]; then
            echo "No env files to scan."
            exit 0
          fi

          secret_pattern='^(sk-|ghp_|gho_|xoxb-|AKIA|ASIA|AIza)'
          failed=0

          for file in "${env_files[@]}"; do
            while IFS= read -r line; do
              key="$(echo "${line}" | sed -E 's/^([A-Za-z0-9_]+)=.*/\1/')"
              value="$(echo "${line}" | sed -E 's/^[A-Za-z0-9_]+=//')"
              if [[ "${key}" =~ ^NEXT_PUBLIC_.*(KEY|TOKEN|SECRET)$ ]] && [[ "${value}" =~ ${secret_pattern} ]]; then
                echo "Secret-like NEXT_PUBLIC value detected in ${file}: ${key}"
                failed=1
              fi
            done < <(grep -E '^[A-Za-z0-9_]+=.*' "${file}" || true)
          done

          if [[ ${failed} -ne 0 ]]; then
            exit 1
          fi
          echo "NEXT_PUBLIC env values passed secret-like value checks."
