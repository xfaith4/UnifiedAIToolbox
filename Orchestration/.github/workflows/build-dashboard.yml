name: Build Dashboard
on:
  push:
    branches: [ React/Vite-Dashboard ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Dependencies
        run: |
          cd Orchestration/milestone-dashboard
          npm install --legacy-peer-deps
      - name: Run Tests
        run: |
          cd Orchestration/milestone-dashboard
          npm test
      - name: Build Dashboard
        run: |
          cd Orchestration/milestone-dashboard
          npm run build
