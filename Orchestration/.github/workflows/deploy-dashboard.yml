name: Deploy Milestone Dashboard

on:
  push:
    branches: [ React/Vite-Dashboard ]
    paths:
      - "Orchestration/milestone-dashboard/**"
      - "Orchestration/scripts/Update-OrchestrationMetrics.psm1"
      - "Orchestration/milestone-dashboard/public/data/*.json"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 🧩 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Build Milestone Dashboard (Vite)
        run: |
          cd Orchestration/milestone-dashboard
          npm install --legacy-peer-deps
          npm test
          npm run build

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: Orchestration/milestone-dashboard/dist
          publish_branch: gh-pages
          commit_message: "🚀 Deploy Milestone Dashboard $(date +'%Y-%m-%d %H:%M:%S')"
