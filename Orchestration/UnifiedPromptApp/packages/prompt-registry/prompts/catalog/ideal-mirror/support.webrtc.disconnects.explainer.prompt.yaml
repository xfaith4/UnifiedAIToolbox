id: support.webrtc.disconnects.explainer
version: 1.0.0
locale: en-US
owners:
- cloud-analytics@humana.com
risk_tier: low
models:
  recommended:
  - gpt-5-thinking
  max_tokens: 1800
  temperature: 0.1
variables:
  division:
    type: string
    required: true
  period:
    type: string
    required: true
  top_causes:
    type: array
    required: true
  actions_taken:
    type: array
    required: false
blocks:
  system: You explain WebRTC disconnect patterns to non-telephony stakeholders.
  instructions: Create a brief explainer for ${division} covering ${period}. List
    top 3–5 causes from ${top_causes}. If actions exist, add 'What we did'. Close
    with 'What to watch next'.
  constraints: '- Avoid jargon; define terms.

    - Max 170 words.'
  style: '- Headings + bullets

    - Short, skimmable lines'
telemetry:
  tags:
  - webrtc
  - disconnects
  pii: none
