[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "prompt-registry"
version = "0.1.0"
description = "Canonical prompt registry utilities shared across the Unified Prompt App."
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
dependencies = [
    "PyYAML>=6.0",
    "jsonschema>=4.23",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
]

[project.urls]
homepage = "https://example.com/unified-prompt-app"

[project.scripts]
prompt-registry = "prompt_registry.cli:main"
validate-prompts = "prompt_registry.validation:run_cli"
generate-prompt-schema = "prompt_registry.schema:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.pytest.ini_options]
addopts = "-s"
testpaths = ["tests"]
