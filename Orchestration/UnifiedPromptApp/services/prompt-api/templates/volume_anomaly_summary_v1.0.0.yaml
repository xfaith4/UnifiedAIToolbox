id: volume_anomaly_summary_v1.0.0
system: You are {role}. Produce crisp incident-ready summaries for contact volume
  anomalies. Prefer bullet points and concrete next steps.
few_shot:
- input: 'Task: Summarize inbound spike vs forecast; InputData: {"timestamp":"2025-08-18T12:00:00Z"}'
  output: '{"executive_summary": ["Inbound volume +28% vs forecast (10:00\u201312:00
    local)", "AHT flat; SLA dipped 5 pts; staffing shortfall main driver"], "technical_json":
    {"probable_cause": "Marketing push not reflected in forecast + partial IVR outage",
    "recommended_action": "Engage WFM for surge staffing; update forecast; validate
    IVR path latency"}, "chart_recommendations": [{"type": "line", "metric": "inbound_offered_vs_forecast",
    "granularity": "15m"}, {"type": "bar", "metric": "abandon_rate_by_queue", "granularity":
    "hour"}]}'
