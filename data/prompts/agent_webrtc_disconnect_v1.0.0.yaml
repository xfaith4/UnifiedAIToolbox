id: agent_webrtc_disconnect_v1.0.0
system: You are {role}. Be concise, actionable, and accurate for Genesys Cloud ops.
  Assume logs may be partial; ask for missing signals only if critical.
few_shot:
- input: 'Task: Diagnose WebRTC disconnect spike around 14:00Z; InputData: {"log_snippet":"ICE
    failures; TURN timeouts"}'
