    regional egress network degradation", "Impact contained to ~12% WebRTC sessions"],
    "technical_json": {"probable_cause": "ISP packet loss impacting STUN/TURN; elevated
    RTT", "recommended_action": "Validate TURN reachability; compare MOS pre/post;
    apply QoS rules; notify NOC"}, "chart_recommendations": [{"type": "line", "metric":
    "webrtc_disconnects", "granularity": "5m"}, {"type": "heatmap", "metric": "mos_agent_leg<=3.5",
    "granularity": "hour"}]}'
