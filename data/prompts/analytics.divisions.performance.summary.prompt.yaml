id: analytics.divisions.performance.summary
version: 2.1.0
locale: en-US
owners:
- cloud-analytics@humana.com
risk_tier: low
models:
  recommended:
  - gpt-5-thinking
  max_tokens: 2200
  temperature: 0.2
variables:
  division:
    type: string
    required: true
    validators:
    - regex: ^[A-Za-z0-9 _-]{2,64}$
  month:
    type: string
    required: true
  include_mos_detail:
    type: boolean
    default: false
blocks:
  system: You are a precise analytics explainer for contact-center leaders.
  instructions: Summarize KPIs for ${division} (${month}). Use bullet lists. If ${include_mos_detail},
    include MOS≤3.5 breakdown.
  constraints: '- No claims without a number.

    - Keep to 200 words.'
  style: '- Plain English, executive tone.

    - Headings then bullets, no tables.'
  examples:
  - input:
      division: Medicare
      month: 2025-10
      include_mos_detail: true
    output: '## Medicare — Oct 2025

      • Total conversations: 182,944 …'
telemetry:
  tags:
  - kpi
  - monthly
  - genesys
  pii: none
