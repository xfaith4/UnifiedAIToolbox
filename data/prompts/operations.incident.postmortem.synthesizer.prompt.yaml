id: operations.incident.postmortem.synthesizer
version: 1.2.0
owners:
- sre@humana.com
risk_tier: med
models:
  recommended:
  - gpt-5-thinking
  max_tokens: 2600
  temperature: 0.2
variables:
  incident_id:
    type: string
    required: true
  when:
    type: string
    required: true
  impact_summary:
    type: string
    required: true
  timeline:
    type: array
    required: true
  root_cause:
    type: string
    required: true
  actions:
    type: array
    required: true
blocks:
  system: You are an SRE postmortem editor. Prefer clarity over blame.
  instructions: 'Produce a blameless postmortem for ${incident_id} (${when}). Sections:
    Overview, Impact, Timeline (bullet list), Root Cause, Corrective Actions (owner+ETA),
    Lessons Learned.'
  constraints: '- No speculation.

    - Use RFC3339 timestamps in Timeline if present.'
  style: '- H2 headers, bullets under each

    - Keep under 400 words'
telemetry:
  tags:
  - postmortem
  - sre
  pii: none
