user_template: |
  Design a comprehensive monitoring system for cloud infrastructure with a strong focus on the following key areas:  
1. Security Best Practices: Implement and document strategies to safeguard data integrity and availability, emphasizing identity and access management, encryption protocols, and adherence to relevant compliance standards.  
2. Error Handling and Logging: Develop advanced error handling mechanisms and in-depth logging capabilities to streamline troubleshooting, maintain comprehensive audit trails, and ensure accountability across the system.  
3. Performance Optimization: Formulate and implement strategies aimed at enhancing resource utilization, application responsiveness, and overall system efficiency, including effective load balancing and optimal resource allocation techniques.  
4. Monitoring and Alerting: Establish robust monitoring and alerting functionalities that provide real-time insights and proactive notifications regarding performance metrics and security incidents, ensuring a swift response to potential issues.
