id: volume_anomaly_summary_v2.0.0
title: Volume Anomaly Incident Brief (v2)
version: 2.0.0
locale: en-US
owners:
  - ops-analytics@example.com
risk_tier: med
models:
  recommended:
    - gpt-5
    - gpt-4o
  max_tokens: 2000
  temperature: 0.15
variables:
  division:
    type: string
    required: true
  anomaly_window_start:
    type: string
    required: true
    description: ISO-8601 UTC timestamp
  anomaly_window_end:
    type: string
    required: true
    description: ISO-8601 UTC timestamp
  window_minutes:
    type: integer
    default: 120
  include_staffing_detail:
    type: boolean
    default: true
blocks:
  system: |-
    You are {role}. Produce incident-ready summaries for contact volume anomalies aligned
    to a Power BI incident workbook. Use blunt, quantified language, respect the provided
    telemetry contracts, and always cite the visuals (by id) that informed each conclusion.
  instructions: |-
    Summarize the anomaly detected for ${division} between ${anomaly_window_start} and
    ${anomaly_window_end}. Highlight volume variance vs forecast, SLA impact, abandon
    trends, MOS or quality deltas, and staffing gaps. If ${include_staffing_detail} is
    false, omit staffing commentary. Call out primary drivers (queue, channel, campaign,
    IVR issues) and conclude with prioritized actions.
  constraints: |-
    - Do not invent telemetry; if data is missing, call it out explicitly.
    - Executive summary is limited to 4 bullets.
    - Percentages must include the +/- delta vs forecast.
    - Timestamp all windows in local timezone (America/Indiana/Indianapolis).
  style: |-
    - Section order: Executive Summary → Drivers → Recommended Actions → Visuals to Review.
    - Use imperative verbs for actions (e.g., "Escalate", "Throttle", "Staff").
    - Keep prose under 220 words.
telemetry:
  tags: [incident, anomaly, contact-center]
  pii: none
conventions:
  local_timezone: America/Indiana/Indianapolis
  time_format: "EEE, MMM d, yyyy • HH:mm"
  terminology:
    - Use "inbound" for offered contacts.
    - Say "vs forecast" not "vs plan".
    - Say "AHT" not "average handle".
output_contract:
  keys:
    executive_summary:
      type: array
      items: string
      description: 2–4 quantified bullets
    drivers:
      type: array
      items:
        type: object
        properties:
          dimension: string
          member: string
          variance_pct: number
          contribution_pct: number
    recommended_actions:
      type: array
      items: string
    visuals_to_focus:
      type: array
      items: string
    anomaly_window:
      type: object
      properties:
        local_start: string
        local_end: string
        utc_start: string
        utc_end: string
        granularity: string
visuals_catalog:
  - id: v_kpi_cards
    purpose: "Snap judgment on severity"
    visuals:
      type: multi_kpi
      fields: ["Variance %","SLA %","Abandon Rate %","AHT (sec)","Staffing Gap (FTE)"]
  - id: v_line_offered_vs_forecast
    purpose: "Primary anomaly detection"
    visuals:
      type: line_dual
      notes:
        - Highlight anomaly window.
  - id: v_decomposition_tree_variance
    purpose: "Explain variance interactively"
    visuals:
      type: decomposition_tree
  - id: v_tooltip_anomaly
    purpose: "Dense tooltip for anomaly points"
    visuals:
      type: tooltip_page
design_rules:
  - Use 12-column grid with 24px gutters.
  - Keep main canvas clean; push dense metrics into tooltips.
  - Maintain accessibility contrast ≥ 4.5:1.
few_shot:
  - input:
      division: Member Services
      anomaly_window_start: 2025-08-18T14:00:00Z
      anomaly_window_end: 2025-08-18T16:00:00Z
      include_staffing_detail: true
    output: |-
      ## Executive Summary
      - Inbound +28% vs forecast from 10:00–12:00 ET; SLA −5.2 pts; Abandon +2.1 pts.
      - Variance concentrated in "Member Services L3" (42%) and voice channel (71%).
      - Staffing gap averaged +12 FTE; MOS dipped to 3.8 due to long IVR waits.

      ## Drivers
      - Queue: "Member Services L3" contributed 42% of variance.
      - Channel: Voice traffic +9pt mix shift; chat/email flat.

      ## Recommended Actions
      1. Engage WFM for +12 surge FTE for next 2 hours.
      2. Coordinate with Marketing on campaign throttling.
      3. Validate IVR latency and reroute if p95 > 2.0s.

      ## Visuals
      Focus on v_line_offered_vs_forecast, v_decomposition_tree_variance, v_tooltip_anomaly.
