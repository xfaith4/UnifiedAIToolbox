# Docker Compose for Phase 3 Development
# Unified AI Toolbox v2.0
#
# This configuration includes PostgreSQL and Redis for Phase 3 multi-tenancy development
#
# Usage:
#   docker compose -f docker-compose.phase3.yml up -d
#   docker compose -f docker-compose.phase3.yml down

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: unified-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: unified_dev
      POSTGRES_USER: unified_user
      POSTGRES_PASSWORD: dev_password_change_me
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.utf8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/sqlite/schema-postgres.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unified_user -d unified_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unified-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: unified-redis-dev
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unified-network

  # pgAdmin (PostgreSQL GUI - optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: unified-pgadmin-dev
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@unified-ai.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - unified-network
    profiles:
      - tools  # Only start with: docker compose --profile tools up

  # Redis Commander (Redis GUI - optional)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: unified-redis-commander-dev
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - unified-network
    profiles:
      - tools  # Only start with: docker compose --profile tools up

  # Prometheus (Monitoring - optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: unified-prometheus-dev
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    ports:
      - "9090:9090"
    volumes:
      - ./docs/phase3/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - unified-network
    profiles:
      - monitoring  # Only start with: docker compose --profile monitoring up

  # Grafana (Dashboards - optional)
  grafana:
    image: grafana/grafana:latest
    container_name: unified-grafana-dev
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docs/phase3/monitoring/grafana-datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
    depends_on:
      - prometheus
    networks:
      - unified-network
    profiles:
      - monitoring  # Only start with: docker compose --profile monitoring up

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  pgadmin_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  unified-network:
    driver: bridge
    name: unified-dev-network
