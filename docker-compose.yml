version: '3.8'

services:
  prompt-api:
    build:
      context: .
      dockerfile: apps/UnifiedPromptApp/services/prompt-api/Dockerfile
    ports:
      - "${API_PORT:-8000}:8000"
    environment:
      - PROMPT_API_PORT=8000
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - FRONTEND_PORT=${FRONTEND_PORT:-5173}
      - WORKBENCH_PORT=${WORKBENCH_PORT:-8501}
    volumes:
      - ./apps/UnifiedPromptApp/services/prompt-api/data:/app/apps/UnifiedPromptApp/services/prompt-api/data
      - ./apps/UnifiedPromptApp/services/prompt-api/workbench.db:/app/apps/UnifiedPromptApp/services/prompt-api/workbench.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    environment:
      - VITE_PORT=5173
      - VITE_API_BASE=http://localhost:${API_PORT:-8000}
    depends_on:
      prompt-api:
        condition: service_healthy
    restart: unless-stopped

  unified-webapp:
    build:
      context: .
      dockerfile: apps/unifiedtoolbox.webapp/Dockerfile
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_BASE=http://localhost:${API_PORT:-8000}
    depends_on:
      prompt-api:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: unified-ai-toolbox
