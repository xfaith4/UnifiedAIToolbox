<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="520" fill="#0f172a"/>
  <text x="40" y="50" fill="#e2e8f0" font-family="Arial, sans-serif" font-size="24">GitHub Orchestration UI (Example)</text>

  <rect x="40" y="80" width="350" height="380" rx="12" fill="#111827" stroke="#1f2937"/>
  <text x="70" y="120" fill="#93c5fd" font-family="Arial, sans-serif" font-size="16">Run Summary</text>
  <rect x="70" y="140" width="300" height="14" rx="6" fill="#1f2937"/>
  <rect x="70" y="165" width="260" height="14" rx="6" fill="#1f2937"/>
  <rect x="70" y="200" width="200" height="32" rx="8" fill="#2563eb"/>
  <text x="85" y="222" fill="#ffffff" font-family="Arial, sans-serif" font-size="12">View Report</text>
  <rect x="70" y="245" width="200" height="32" rx="8" fill="#1f2937"/>
