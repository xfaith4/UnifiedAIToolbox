# kind cluster configuration for Phase 3 local development
# Unified AI Toolbox v2.0
#
# Usage: kind create cluster --name unified-dev --config=docs/phase3/k8s/kind-config.yaml

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: unified-dev

# Configure nodes
nodes:
  # Control plane node
  - role: control-plane
    image: kindest/node:v1.28.0
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # HTTP
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      # HTTPS
      - containerPort: 443
        hostPort: 443
        protocol: TCP
      # API Server (dashboard)
      - containerPort: 30000
        hostPort: 8000
        protocol: TCP
      # Dashboard UI
      - containerPort: 30001
        hostPort: 5173
        protocol: TCP
      # PostgreSQL (if deployed in cluster)
      - containerPort: 30432
        hostPort: 5432
        protocol: TCP
      # Redis (if deployed in cluster)
      - containerPort: 30379
        hostPort: 6379
        protocol: TCP
      # Prometheus
      - containerPort: 30090
        hostPort: 9090
        protocol: TCP
      # Grafana
      - containerPort: 30030
        hostPort: 3000
        protocol: TCP
    extraMounts:
      # Mount local data directory into cluster
      - hostPath: ./data
        containerPath: /data
        readOnly: false

  # Worker node 1
  - role: worker
    image: kindest/node:v1.28.0

  # Worker node 2 (optional, comment out for lower resource usage)
  - role: worker
    image: kindest/node:v1.28.0

# Networking configuration
networking:
  apiServerAddress: "127.0.0.1"
  apiServerPort: 6443
  podSubnet: "10.244.0.0/16"
  serviceSubnet: "10.96.0.0/12"
  disableDefaultCNI: false

# Feature gates
featureGates:
  EphemeralContainers: true
  PodSecurity: true

# Runtime configuration
kubeadmConfigPatches:
  - |
    kind: ClusterConfiguration
    apiServer:
      extraArgs:
        enable-admission-plugins: NodeRestriction,PodSecurity
    controllerManager:
      extraArgs:
        node-monitor-grace-period: 10s
        node-monitor-period: 5s
