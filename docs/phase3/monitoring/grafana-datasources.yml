# Grafana Datasources Configuration for Phase 3
# Unified AI Toolbox v2.0

apiVersion: 1

datasources:
  # Prometheus datasource
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true
    jsonData:
      timeInterval: '15s'
      httpMethod: POST
    version: 1

  # PostgreSQL datasource (optional - for direct DB queries)
