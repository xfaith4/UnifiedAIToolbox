# Prometheus Configuration for Phase 3
# Unified AI Toolbox v2.0

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: 'development'
    cluster: 'unified-dev'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ['localhost:9093']

# Rule files
rule_files:
  # - 'alerts/*.yml'

# Scrape configurations
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Unified AI Toolbox API
  - job_name: 'unified-api'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:8000']
        labels:
          service: 'prompt-api'
          component: 'backend'

  # Dashboard (if metrics enabled)
  - job_name: 'unified-dashboard'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:5173']
        labels:
          service: 'dashboard'
          component: 'frontend'

  # PostgreSQL Exporter (optional - requires postgres_exporter)
