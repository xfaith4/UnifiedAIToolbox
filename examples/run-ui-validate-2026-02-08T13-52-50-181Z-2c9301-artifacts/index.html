<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Star Wars Symbol (Text)</title>
    <style>
      :root {
        --bg: #0b0f1a;
        --fg: #f5f7ff;
        --accent: #ffe81f; /* iconic color, but generic usage */
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        background: radial-gradient(1200px 700px at 50% 40%, #141a2a 0%, var(--bg) 55%, #05070f 100%);
        color: var(--fg);
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
        display: grid;
        place-items: center;
      }
      #app {
        width: min(960px, 92vw);
        padding: 3rem 1.5rem;
        text-align: center;
      }
      .symbol {
        margin: 0;
        font-weight: 800;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        font-size: clamp(2.2rem, 6vw, 5rem);
        color: var(--accent);
        text-shadow: 0 2px 20px rgba(255, 232, 31, 0.12);
      }
      .note {
        margin: 1rem auto 0;
        max-width: 70ch;
        opacity: 0.8;
        font-size: 0.95rem;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <!-- App mount point -->
    <main id="app" role="main" aria-label="Star Wars symbol display">
