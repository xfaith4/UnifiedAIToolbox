## src/phi_explorer/core/fibonacci.py

```python
from __future__ import annotations


def fibonacci_numbers(n: int) -> list[int]:
    """
    Return first n Fibonacci numbers with F1=1, F2=1.
    Example: n=5 -> [1,1,2,3,5]
    """
    if n <= 0:
        return []
    if n == 1:
        return [1]
    seq = [1, 1]
    while len(seq) < n:
        seq.append(seq[-1] + seq[-2])
    return seq
```

