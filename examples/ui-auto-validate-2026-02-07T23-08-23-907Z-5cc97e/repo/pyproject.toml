## src/phi_explorer/ui/main_window.py

```python
from __future__ import annotations

import tkinter as tk
from tkinter import ttk

from phi_explorer.ui.tabs.calculator_tab import CalculatorTab
from phi_explorer.ui.tabs.golden_rectangle_tab import GoldenRectangleTab
from phi_explorer.ui.tabs.fibonacci_spiral_tab import FibonacciSpiralTab
from phi_explorer.ui.tabs.reference_tab import ReferenceTab


def run_app() -> None:
    root = tk.Tk()
    root.title("Golden Ratio (φ) Explorer")

    # Basic, single-window notebook layout (MVP).
    notebook = ttk.Notebook(root)
    notebook.pack(fill="both", expand=True)

    notebook.add(CalculatorTab(notebook), text="Calculator")
    notebook.add(GoldenRectangleTab(notebook), text="Golden Rectangle")
    notebook.add(FibonacciSpiralTab(notebook), text="Fibonacci Spiral")
    notebook.add(ReferenceTab(notebook), text="Quick Reference")

    root.minsize(900, 650)
    root.mainloop()
```

