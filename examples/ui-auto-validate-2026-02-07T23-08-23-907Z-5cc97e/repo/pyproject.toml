## src/phi_explorer/core/phi_math.py

```python
from __future__ import annotations

import math


def phi() -> float:
    """Golden ratio constant φ = (1 + √5) / 2."""
    return (1.0 + math.sqrt(5.0)) / 2.0


def compute_phi_relations(a: float) -> tuple[float, float]:
    """Given A, return (A*φ, A/φ)."""
    p = phi()
    return a * p, (a / p if p != 0 else float("nan"))
```

