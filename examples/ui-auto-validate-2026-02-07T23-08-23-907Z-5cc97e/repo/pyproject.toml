## src/phi_explorer/ui/tabs/calculator_tab.py

```python
from __future__ import annotations

import tkinter as tk
from tkinter import ttk

from phi_explorer.core.phi_math import phi, compute_phi_relations


class CalculatorTab(ttk.Frame):
    def __init__(self, master: tk.Misc):
        super().__init__(master)
        self.columnconfigure(1, weight=1)

        ttk.Label(self, text="Base length A:").grid(row=0, column=0, sticky="w", padx=8, pady=8)
        self.a_var = tk.StringVar(value="1.0")
        ttk.Entry(self, textvariable=self.a_var).grid(row=0, column=1, sticky="ew", padx=8, pady=8)

        ttk.Button(self, text="Compute", command=self._compute).grid(
            row=0, column=2, sticky="e", padx=8, pady=8
        )

        self.msg_var = tk.StringVar(value="")
        ttk.Label(self, textvariable=self.msg_var, foreground="#aa0000").grid(
            row=1, column=0, columnspan=3, sticky="w", padx=8
        )

        self.phi_var = tk.StringVar(value=f"{phi():.12f}")
        self.mul_var = tk.StringVar(value="")
        self.div_var = tk.StringVar(value="")

        ttk.Label(self, text="φ:").grid(row=2, column=0, sticky="w", padx=8, pady=4)
        ttk.Label(self, textvariable=self.phi_var).grid(row=2, column=1, sticky="w", padx=8, pady=4)

        ttk.Label(self, text="A·φ:").grid(row=3, column=0, sticky="w", padx=8, pady=4)
        ttk.Label(self, textvariable=self.mul_var).grid(row=3, column=1, sticky="w", padx=8, pady=4)

        ttk.Label(self, text="A/φ:").grid(row=4, column=0, sticky="w", padx=8, pady=4)
        ttk.Label(self, textvariable=self.div_var).grid(row=4, column=1, sticky="w", padx=8, pady=4)

        self._compute()

    def _compute(self) -> None:
        try:
            a = float(self.a_var.get().strip())
        except ValueError:
            self.msg_var.set("Please enter a valid number for A.")
            return

        self.msg_var.set("")
        m, d = compute_phi_relations(a)
        self.mul_var.set(f"{m:.12f}")
        self.div_var.set(f"{d:.12f}")
```

