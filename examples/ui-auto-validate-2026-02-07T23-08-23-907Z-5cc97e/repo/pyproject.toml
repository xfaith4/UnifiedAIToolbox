## README.md

```markdown
# Golden Ratio (φ) Explorer

Offline desktop application (Python + Tkinter + Matplotlib) for exploring the Golden Ratio φ.

## Run (dev)
```bash
python -m venv .venv
# activate venv...
pip install -e .
phi-explorer
```

## Notes
- Fully offline: no network requests or external assets.
- Matplotlib is the only non-stdlib dependency.
