## src/phi_explorer/ui/tabs/reference_tab.py

```python
from __future__ import annotations

import tkinter as tk
from tkinter import ttk

from phi_explorer.core.phi_math import phi


class ReferenceTab(ttk.Frame):
    def __init__(self, master: tk.Misc):
        super().__init__(master)

        text = tk.Text(self, wrap="word", height=30)
        text.pack(fill="both", expand=True, padx=10, pady=10)

        p = phi()
        content = (
            "Golden Ratio (φ) Quick Reference\n\n"
            f"φ = (1 + √5) / 2 ≈ {p:.15f}\n\n"
            "Continued fraction:\n"
            "  φ = [1; 1, 1, 1, …]\n\n"
            "Identities:\n"
            "  φ² = φ + 1\n"
            "  1/φ = φ − 1\n\n"
            "Fibonacci relationship:\n"
            "  limₙ→∞ Fₙ₊₁ / Fₙ = φ\n"
        )
        text.insert("1.0", content)
        text.configure(state="disabled")
```

