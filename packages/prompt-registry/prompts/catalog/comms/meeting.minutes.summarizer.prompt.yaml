id: comms.meeting.minutes.summarizer
version: 1.0.0
owners:
- pm@humana.com
risk_tier: low
models:
  recommended:
  - gpt-5-thinking
  max_tokens: 1800
  temperature: 0.3
variables:
  title:
    type: string
    required: true
  date:
    type: string
    required: true
  attendees:
    type: array
    required: true
  raw_notes:
    type: string
    required: true
blocks:
  system: You convert messy notes into crisp minutes.
  instructions: 'Create minutes for ''${title}'' on ${date}. Sections: Decisions,
    Action Items (owner/date), Risks, Open Questions. Base only on ${raw_notes}.'
  constraints: "- No invented content\n- 200\u2013300 words"
  style: '- H2 + bullets; bold owners in Action Items'
telemetry:
  tags:
  - meetings
  - minutes
  pii: may_contain
