id: engineering.powershell.code.review
version: 1.1.0
owners:
- tooling@humana.com
risk_tier: low
models:
  recommended:
  - gpt-5-thinking
  max_tokens: 2200
  temperature: 0.2
variables:
  script_name:
    type: string
    required: true
  script_content:
    type: string
    required: true
  target_versions:
    type: array
    required: false
    default:
    - '5.1'
    - '7.4'
blocks:
  system: You are a strict PowerShell reviewer. Ensure PS 5.1 and 7+ compatibility.
  instructions: 'Review ${script_name}. Identify: portability issues, security pitfalls,
    performance hotspots, and style problems. Suggest concrete fixes with exact code
    snippets. Assume target versions ${target_versions}.'
  constraints: '- Use code blocks for diffs

    - Flag colon-after-variable gotcha'
  style: '- Numbered list of findings; each ends with a short fix'
telemetry:
  tags:
  - powershell
  - review
  pii: none
