name: CI - Comprehensive

# ============================================================================
# TEMPLATE: Generic comprehensive CI workflow
# ============================================================================
# This template provides automated CI with:
# - Multi-platform matrix builds (Ubuntu + Windows)
# - PowerShell, Python, Node.js support
# - Artifact collection and upload
# - Test execution and reporting
#
# CUSTOMIZATION REQUIRED:
# 1. Replace {{PROJECT_NAME}} with your project name
# 2. Adjust matrix configurations for your needs
# 3. Update build/test commands for your tech stack
# 4. Modify artifact paths to match your project structure
# 5. Remove jobs not relevant to your project
# ============================================================================

on:
  push:
    branches:
      - main
      - feature/**
      - dev/**
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      run_smoke_tests:
        description: 'Run smoke tests'
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  pull-requests: write  # For PR comments

jobs:
  # ============================================================================
  # PowerShell Module Tests
  # ============================================================================
  powershell-tests:
    name: PowerShell ${{ matrix.pwsh-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        pwsh-version: ['7.4']  # CUSTOMIZATION: Adjust versions
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup PowerShell
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'  # For PowerShell 7.4+
      
      # CUSTOMIZATION: Install your required PowerShell modules
      - name: Install PowerShell modules
        shell: pwsh
        run: |
          Set-PSRepository PSGallery -InstallationPolicy Trusted
          Install-Module Pester -MinimumVersion 5.0 -Scope CurrentUser -Force
          # Add other modules as needed
      
      # CUSTOMIZATION: Run your PowerShell tests
      - name: Run PowerShell tests
        shell: pwsh
        run: |
          Write-Host "Running PowerShell tests..." -ForegroundColor Cyan
          
          # Example: Using Pester
          $config = New-PesterConfiguration
          $config.Run.Path = './tests'
          $config.Output.Verbosity = 'Detailed'
          $config.TestResult.Enabled = $true
          $config.TestResult.OutputPath = './testResults.xml'
          
          Invoke-Pester -Configuration $config
      
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: powershell-test-results-${{ matrix.os }}
          path: testResults.xml
          retention-days: 30

  # ============================================================================
  # Python Tests
  # ============================================================================
  python-tests:
    name: Python ${{ matrix.python-version }} on ubuntu-latest
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']  # CUSTOMIZATION: Adjust versions
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      # CUSTOMIZATION: Install your Python dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov
          # Install your requirements
          # pip install -r requirements.txt
      
      # CUSTOMIZATION: Run your Python tests
      - name: Run Python tests
        run: |
          pytest --cov=. --cov-report=xml --cov-report=html
      
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-${{ matrix.python-version }}
          path: htmlcov/
          retention-days: 30

  # ============================================================================
  # Node.js / TypeScript Build
  # ============================================================================
  nodejs-build:
    name: Node.js Build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'  # CUSTOMIZATION: Adjust version
          cache: 'npm'
      
      # CUSTOMIZATION: Adjust for your project structure
      - name: Install dependencies
        run: |
          # If using a monorepo or specific app directory:
          # cd apps/{{YOUR_APP}}
          npm install
      
      - name: Run linting
        run: |
          npm run lint || true
      
      - name: Run tests
        run: |
          npm test || true
      
      - name: Build
        run: |
          npm run build
      
      # CUSTOMIZATION: Adjust artifact path
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nodejs-build
          path: |
            dist/
            build/
          retention-days: 30
          if-no-files-found: warn

  # ============================================================================
  # .NET Build (Optional - remove if not needed)
  # ============================================================================
  dotnet-build:
    name: .NET Build
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'  # CUSTOMIZATION: Adjust version
      
      - name: Restore dependencies
        run: dotnet restore
      
      - name: Build
        run: dotnet build --configuration Release --no-restore
      
      - name: Test
        run: dotnet test --no-build --configuration Release
      
      # CUSTOMIZATION: Adjust artifact path
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dotnet-build
          path: |
            **/bin/Release/**
          retention-days: 30
          if-no-files-found: warn

  # ============================================================================
  # Smoke Tests (Optional)
  # ============================================================================
  smoke-tests:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: [powershell-tests, python-tests, nodejs-build]
    if: github.event.inputs.run_smoke_tests == 'true' || github.event_name != 'workflow_dispatch'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      # CUSTOMIZATION: Add your smoke test logic
      - name: Run smoke tests
        shell: pwsh
        run: |
          Write-Host "Running smoke tests..." -ForegroundColor Cyan
          # Add your smoke test script here
          # Example: pwsh ./scripts/Smoketest.ps1

  # ============================================================================
  # CI Summary
  # ============================================================================
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [powershell-tests, python-tests, nodejs-build]
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          echo "## 🚀 CI Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| PowerShell Tests | ${{ needs.powershell-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Python Tests | ${{ needs.python-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Node.js Build | ${{ needs.nodejs-build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "Build artifacts are available in the workflow run artifacts section." >> $GITHUB_STEP_SUMMARY
